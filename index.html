<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UAE News Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#05080f;color:#e2e8f0;min-height:100vh}
.wrap{max-width:520px;margin:0 auto}

/* Header */
.hdr{position:sticky;top:0;z-index:50;background:rgba(5,8,15,.95);backdrop-filter:blur(12px);padding:14px 16px 0;border-bottom:1px solid #111827}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-left .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hdr-left h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:8px;font-size:10px;color:#475569}
.refresh-btn{background:none;border:1px solid #1e293b;color:#64748b;font-size:10px;padding:2px 8px;border-radius:8px;cursor:pointer}
.refresh-btn:hover{border-color:#334155;color:#94a3b8}

/* Days strip */
.days{display:flex;gap:4px;padding-bottom:12px}
.dbtn{flex:1 1 0;background:#111827;border:none;border-radius:10px;padding:7px 2px;cursor:pointer;text-align:center;min-width:0;transition:background .15s,opacity .15s}
.dbtn.active{background:#3b82f6}
.dbtn .dw{font-size:9px;font-weight:600;color:#475569}
.dbtn.active .dw{color:#dbeafe}
.dbtn .dd{font-size:16px;font-weight:700;color:#e2e8f0;line-height:1.2}
.dbtn.active .dd{color:#fff}
.dbtn .ddot{width:4px;height:4px;border-radius:50%;background:#3b82f6;margin:3px auto 0}
.dbtn.active .ddot{background:#fff}

/* Body */
.main{padding:12px 16px 24px}

/* Stats row */
.stats{display:flex;gap:8px;margin-bottom:14px}
.sbox{flex:1;background:#0c1117;border:1px solid #151d28;border-radius:10px;padding:10px 8px;text-align:center}
.sbox .sv{font-size:20px;font-weight:700;line-height:1}
.sbox .sl{font-size:9px;color:#475569;margin-top:3px}

/* Category pills */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch}
.pill{background:transparent;border:1px solid #1e293b;color:#64748b;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pill.on{background:var(--pbg);border-color:var(--pbd);color:var(--ptx)}

/* News cards */
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#0c1117;border:1px solid #151d28;border-radius:14px;cursor:pointer;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#1e293b}
.card.urgent{border-color:rgba(239,68,68,.25)}
.card-inner{padding:14px 16px;border-left:3px solid var(--cbd,#64748b)}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.card-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--cbg);color:var(--ctx)}
.card-urg{font-size:10px;font-weight:700;color:#ef4444}
.card-time{margin-left:auto;font-size:11px;color:#475569}
.card-title{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.45}
.card-expand{margin-top:12px;padding-top:12px;border-top:1px solid #151d28;animation:fadeIn .2s}
.card-desc{font-size:13px;color:#9ca3af;line-height:1.7;margin-bottom:10px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-src{font-size:11px;color:#374151}
.card-link{font-size:11px;color:#3b82f6;text-decoration:none;font-weight:600}
.card-link:hover{text-decoration:underline}
.card-toggle{text-align:right;margin-top:6px;font-size:10px;color:#334155}

/* States */
.loading-box{text-align:center;padding:80px 20px}
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid #1e293b;border-top-color:#3b82f6;margin:0 auto 20px;animation:spin 1s linear infinite}
.error-box{text-align:center;padding:60px 20px}
.retry-btn{background:#3b82f6;color:#fff;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
.retry-btn:hover{background:#2563eb}
.soft-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#fbbf24}
.empty{text-align:center;padding:40px 16px;color:#475569;font-size:13px}
.footer{text-align:center;padding:20px 0 32px;color:#1e293b;font-size:10px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ===== CONFIG ===== */
const FEEDS = [
  "https://news.google.com/rss/search?q=UAE+news&hl=en&gl=AE&ceid=AE:en",
  "https://news.google.com/rss/search?q=Dubai+news+today&hl=en&gl=AE&ceid=AE:en",
  "https://news.google.com/rss/search?q=UAE+Iran+war+2026&hl=en&gl=AE&ceid=AE:en",
  "https://news.google.com/rss/search?q=UAE+flights+airport&hl=en&gl=AE&ceid=AE:en",
  "https://news.google.com/rss/search?q=Abu+Dhabi+news&hl=en&gl=AE&ceid=AE:en",
  "https://news.google.com/rss/search?q=UAE+safety+alert&hl=en&gl=AE&ceid=AE:en",
  "https://news.google.com/rss/search?q=Strait+of+Hormuz&hl=en&gl=AE&ceid=AE:en",
];
const PROXY = url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=20`;
const PROXY2 = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
const REFRESH_MS = 600000;

/* ===== CATEGORIZATION ===== */
const RULES = [
  { c: "CONFLICT", k: ["iran","war","strike","attack","bomb","kharg","hormuz","combat","retaliat","weapon","military operation"] },
  { c: "FLIGHTS", k: ["flight","airport","dxb","airline","emirates airline","etihad","aviation","airspace","cancel","passenger"] },
  { c: "DEFENCE", k: ["intercept","missile","drone","air defen","ballistic","irgc","shield","air force","navy","warship"] },
  { c: "SAFETY", k: ["shelter","evacuat","safety","warning","alert","embassy","consular","danger","protect"] },
  { c: "DIPLOMACY", k: ["minister","diplomat","resolution","ceasefire","talks","summit","un security","treaty","negotiate"] },
  { c: "ECONOMY", k: ["oil price","economic","market","trade","port","shipping","crude","stock","barrel","fuel"] },
  { c: "COMMUNITY", k: ["expat","resident","school","remote","daily life","ramadan","community","citizen"] },
];
const COLORS = {
  CONFLICT: { bg:"rgba(244,63,94,.12)", tx:"#fda4af", bd:"#f43f5e" },
  FLIGHTS:  { bg:"rgba(59,130,246,.12)", tx:"#93c5fd", bd:"#3b82f6" },
  DEFENCE:  { bg:"rgba(34,197,94,.12)", tx:"#86efac", bd:"#22c55e" },
  SAFETY:   { bg:"rgba(245,158,11,.12)", tx:"#fcd34d", bd:"#f59e0b" },
  DIPLOMACY:{ bg:"rgba(168,85,247,.12)", tx:"#d8b4fe", bd:"#a855f7" },
  ECONOMY:  { bg:"rgba(234,179,8,.12)", tx:"#fde047", bd:"#eab308" },
  COMMUNITY:{ bg:"rgba(99,102,241,.12)", tx:"#a5b4fc", bd:"#6366f1" },
  GENERAL:  { bg:"rgba(148,163,184,.08)",tx:"#94a3b8", bd:"#64748b" },
};

function classify(text) {
  var t = text.toLowerCase();
  for (var i = 0; i < RULES.length; i++) {
    for (var j = 0; j < RULES[i].k.length; j++) {
      if (t.indexOf(RULES[i].k[j]) !== -1) return RULES[i].c;
    }
  }
  return "GENERAL";
}
function isUrgent(title) {
  var t = title.toLowerCase();
  var kws = ["breaking","urgent","attack","strike","intercept","halt","suspend","shelter","evacuate","killed","destroy","fire"];
  for (var i = 0; i < kws.length; i++) { if (t.indexOf(kws[i]) !== -1) return true; }
  return false;
}
function strip(s) { return (s || "").replace(/<[^>]*>/g, "").replace(/&[^;]+;/g, " ").replace(/\s+/g, " ").trim(); }
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

/* ===== STATE ===== */
var news = [];
var state = "loading"; // loading | ready | error
var lastUp = null;
var countdown = REFRESH_MS / 1000;
var selCat = "ALL";
var selDay = null;
var expanded = null;
var softError = "";

/* ===== FEED FETCHING ===== */
function parseRss2Json(data) {
  if (!data || data.status !== "ok" || !Array.isArray(data.items)) return [];
  return data.items;
}

function parseXML(text) {
  try {
    var parser = new DOMParser();
    var doc = parser.parseFromString(text, "text/xml");
    var items = doc.querySelectorAll("item");
    var results = [];
    items.forEach(function(item) {
      results.push({
        title: (item.querySelector("title") || {}).textContent || "",
        description: (item.querySelector("description") || {}).textContent || "",
        link: (item.querySelector("link") || {}).textContent || "#",
        author: (item.querySelector("source") || {}).textContent || "",
        pubDate: (item.querySelector("pubDate") || {}).textContent || "",
      });
    });
    return results;
  } catch(e) { return []; }
}

async function fetchOneFeed(feedUrl) {
  // Try proxy 1
  try {
    var res = await fetch(PROXY(feedUrl));
    if (res.ok) {
      var data = await res.json();
      var items = parseRss2Json(data);
      if (items.length > 0) return items;
    }
  } catch(e) { /* fallthrough */ }

  // Try proxy 2
  try {
    var res2 = await fetch(PROXY2(feedUrl));
    if (res2.ok) {
      var text = await res2.text();
      var items2 = parseXML(text);
      if (items2.length > 0) return items2;
    }
  } catch(e) { /* fallthrough */ }

  return [];
}

async function fetchAllFeeds() {
  var results = [];
  var seen = {};
  var now = Date.now();
  var weekAgo = now - 7 * 86400000;

  var promises = FEEDS.map(function(f) { return fetchOneFeed(f); });
  var settled = await Promise.allSettled(promises);

  settled.forEach(function(res) {
    if (res.status !== "fulfilled") return;
    res.value.forEach(function(item) {
      var title = (item.title || "").trim();
      var key = title.toLowerCase().slice(0, 50);
      if (!key || seen[key]) return;

      var pub = new Date(item.pubDate);
      if (isNaN(pub.getTime()) || pub.getTime() < weekAgo) return;
      seen[key] = true;

      var desc = strip(item.description || "").slice(0, 350);
      var cat = classify(title + " " + desc);

      results.push({
        title: title,
        desc: desc,
        link: item.link || "#",
        src: (item.author || "").replace(/^www\./, ""),
        cat: cat,
        urgent: isUrgent(title),
        date: pub.toISOString().slice(0, 10),
        time: pub.toLocaleDateString("en-GB", { day: "numeric", month: "short" }),
        ts: pub.getTime(),
      });
    });
  });

  results.sort(function(a, b) { return b.ts - a.ts; });
  return results;
}

/* ===== LOAD ===== */
async function loadNews() {
  if (news.length === 0) { state = "loading"; }
  softError = "";
  render();

  try {
    var items = await fetchAllFeeds();
    if (items.length === 0) throw new Error("No articles returned");
    news = items;
    lastUp = new Date();
    countdown = REFRESH_MS / 1000;
    state = "ready";
    softError = "";
  } catch(e) {
    if (news.length > 0) {
      softError = "Refresh failed — showing last data. Will retry.";
      countdown = REFRESH_MS / 1000;
    } else {
      state = "error";
    }
  }
  render();
}

/* ===== HELPERS ===== */
function getLast7() {
  var r = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(); d.setDate(d.getDate() - i);
    r.push({
      key: d.toISOString().slice(0, 10),
      d: d.getDate(),
      wd: ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()],
      today: i === 0
    });
  }
  return r;
}

/* ===== RENDER ===== */
function render() {
  var days = getLast7();
  var mn = Math.floor(countdown / 60);
  var sc = countdown % 60;
  var timeStr = lastUp ? lastUp.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
  var dotColor = state === "loading" ? "#facc15" : state === "ready" ? "#22c55e" : "#ef4444";
  var cdText = state === "loading" ? "loading…" : mn + ":" + String(sc).padStart(2, "0");

  // Filter
  var filtered = [];
  for (var i = 0; i < news.length; i++) {
    var n = news[i];
    if (selCat !== "ALL" && n.cat !== selCat) continue;
    if (selDay && n.date !== selDay) continue;
    filtered.push(n);
  }

  var cats = ["ALL"];
  var catSet = {};
  news.forEach(function(n) { if (!catSet[n.cat]) { catSet[n.cat] = true; cats.push(n.cat); } });

  var urgCount = 0;
  var todayCount = 0;
  news.forEach(function(n) { if (n.urgent) urgCount++; if (days[0] && n.date === days[0].key) todayCount++; });

  var html = '';

  /* HEADER */
  html += '<div class="hdr">';
  html += '<div class="hdr-row">';
  html += '<div class="hdr-left"><div class="dot" style="background:' + dotColor + ';box-shadow:0 0 6px ' + dotColor + '44"></div><h1>UAE NEWS MONITOR</h1></div>';
  html += '<div class="hdr-right">';
  if (timeStr) html += '<span>' + timeStr + '</span>';
  html += '<span>' + cdText + '</span>';
  if (state !== "loading") html += '<button class="refresh-btn" onclick="loadNews()">↻</button>';
  html += '</div></div>';

  /* DAYS STRIP */
  if (news.length > 0) {
    html += '<div class="days">';
    html += '<button class="dbtn' + (!selDay ? ' active' : '') + '" onclick="window._setDay(null)">';
    html += '<div class="dw">' + (!selDay ? 'ALL' : 'ALL') + '</div><div class="dd">' + news.length + '</div></button>';
    days.forEach(function(d) {
      var ct = 0;
      news.forEach(function(n) { if (n.date === d.key) ct++; });
      var active = selDay === d.key;
      html += '<button class="dbtn' + (active ? ' active' : '') + '" style="opacity:' + (ct > 0 ? '1' : '.3') + '" onclick="window._setDay(\'' + d.key + '\')">';
      html += '<div class="dw">' + (d.today ? 'TODAY' : d.wd) + '</div>';
      html += '<div class="dd">' + d.d + '</div>';
      if (ct > 0) html += '<div class="ddot"></div>';
      html += '</button>';
    });
    html += '</div>';
  }
  html += '</div>'; // end hdr

  /* MAIN */
  html += '<div class="main">';

  /* LOADING STATE */
  if (state === "loading" && news.length === 0) {
    html += '<div class="loading-box"><div class="spinner"></div>';
    html += '<div style="color:#94a3b8;font-size:14px;margin-bottom:4px">Loading UAE news feeds…</div>';
    html += '<div style="color:#475569;font-size:11px">Fetching from Google News RSS</div></div>';
    html += '</div>';
    document.getElementById("app").innerHTML = html;
    return;
  }

  /* ERROR STATE */
  if (state === "error" && news.length === 0) {
    html += '<div class="error-box"><div style="font-size:28px;margin-bottom:12px">⚠️</div>';
    html += '<div style="color:#f87171;font-size:13px;margin-bottom:4px">Could not load news feeds</div>';
    html += '<div style="color:#475569;font-size:11px;margin-bottom:20px">RSS proxies may be temporarily unavailable</div>';
    html += '<button class="retry-btn" onclick="loadNews()">Retry</button></div>';
    html += '</div>';
    document.getElementById("app").innerHTML = html;
    return;
  }

  /* SOFT ERROR */
  if (softError) {
    html += '<div class="soft-warn">⚠️ ' + esc(softError) + '</div>';
  }

  /* STATS */
  html += '<div class="stats">';
  html += '<div class="sbox"><div class="sv" style="color:#60a5fa">' + news.length + '</div><div class="sl">stories</div></div>';
  html += '<div class="sbox"><div class="sv" style="color:#f87171">' + urgCount + '</div><div class="sl">urgent</div></div>';
  html += '<div class="sbox"><div class="sv" style="color:#4ade80">' + todayCount + '</div><div class="sl">today</div></div>';
  html += '</div>';

  /* CATEGORY PILLS */
  html += '<div class="pills">';
  cats.forEach(function(f) {
    var c = COLORS[f] || COLORS.GENERAL;
    var active = selCat === f;
    if (active) {
      html += '<button class="pill on" style="--pbg:' + c.bg + ';--pbd:' + c.bd + ';--ptx:' + c.tx + '" onclick="window._setCat(\'' + f + '\')">' + f + '</button>';
    } else {
      html += '<button class="pill" onclick="window._setCat(\'' + f + '\')">' + f + '</button>';
    }
  });
  html += '</div>';

  /* NEWS CARDS */
  html += '<div class="cards">';
  if (filtered.length === 0) {
    html += '<div class="empty">No stories match this filter.</div>';
  }
  filtered.forEach(function(n, i) {
    var c = COLORS[n.cat] || COLORS.GENERAL;
    var k = selCat + "-" + (selDay || "all") + "-" + i;
    var open = expanded === k;

    html += '<div class="card' + (n.urgent ? ' urgent' : '') + '" onclick="window._toggle(\'' + k + '\')">';
    html += '<div class="card-inner" style="--cbd:' + c.bd + '">';

    // Top bar
    html += '<div class="card-top">';
    html += '<span class="card-tag" style="--cbg:' + c.bg + ';--ctx:' + c.tx + '">' + esc(n.cat) + '</span>';
    if (n.urgent) html += '<span class="card-urg">URGENT</span>';
    html += '<span class="card-time">' + esc(n.time) + '</span>';
    html += '</div>';

    // Title
    html += '<div class="card-title">' + esc(n.title) + '</div>';

    // Expanded
    if (open) {
      html += '<div class="card-expand">';
      html += '<div class="card-desc">' + esc(n.desc || "No description available.") + '</div>';
      html += '<div class="card-foot">';
      html += '<span class="card-src">' + esc(n.src) + '</span>';
      html += '<a class="card-link" href="' + esc(n.link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read article →</a>';
      html += '</div></div>';
    }

    html += '<div class="card-toggle">' + (open ? '▲ Less' : '▼ More') + '</div>';
    html += '</div></div>';
  });
  html += '</div>';

  html += '<div class="footer">Powered by Google News RSS • Auto-refreshes every 10 min</div>';
  html += '</div>'; // end main

  document.getElementById("app").innerHTML = html;
}

/* ===== GLOBAL HANDLERS ===== */
window._setDay = function(d) { selDay = (selDay === d) ? null : d; expanded = null; render(); };
window._setCat = function(c) { selCat = c; expanded = null; render(); };
window._toggle = function(k) { expanded = (expanded === k) ? null : k; render(); };

/* ===== INIT ===== */
render();
loadNews();
setInterval(loadNews, REFRESH_MS);
setInterval(function() {
  countdown = Math.max(0, countdown - 1);
  var el = document.querySelector(".hdr-right span:nth-child(2)");
  if (el) el.textContent = Math.floor(countdown/60) + ":" + String(countdown%60).padStart(2,"0");
}, 1000);
</script>
</body>
</html>
