<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UAE News Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#05080f;color:#e2e8f0;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:0 16px}
.hdr{position:sticky;top:0;z-index:50;background:rgba(5,8,15,.96);backdrop-filter:blur(14px);border-bottom:1px solid #111827;padding:16px 0 0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-left .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
.hdr-left h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:10px;font-size:11px;color:#475569}
.rbtn{background:none;border:1px solid #1e293b;color:#64748b;font-size:11px;padding:4px 12px;border-radius:8px;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:#334155;color:#94a3b8}
.days{display:flex;gap:5px;padding-bottom:14px}
.dbtn{flex:1 1 0;background:#0c1117;border:1px solid #151d28;border-radius:10px;padding:8px 4px;cursor:pointer;text-align:center;min-width:0;transition:all .15s}
.dbtn:hover{border-color:#1e293b}
.dbtn.on{background:#3b82f6;border-color:#3b82f6}
.dbtn .dw{font-size:9px;font-weight:600;color:#475569;text-transform:uppercase}
.dbtn.on .dw{color:#dbeafe}
.dbtn .dd{font-size:17px;font-weight:700;color:#cbd5e1;line-height:1.3}
.dbtn.on .dd{color:#fff}
.dbtn .dc{font-size:9px;color:#475569;margin-top:2px}
.dbtn.on .dc{color:#bfdbfe}
.main{padding:16px 0 32px}
.top-bar{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.sidebar{flex:0 0 220px}
.feed{flex:1;min-width:0}
@media(max-width:700px){.top-bar{flex-direction:column}.sidebar{flex:none}}
.cat-list{display:flex;flex-direction:column;gap:4px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;font-size:13px;font-weight:500}
.cat-item:hover{background:rgba(255,255,255,.03)}
.cat-item.on{border-color:var(--cbd);background:var(--cbg)}
.cat-item .cname{display:flex;align-items:center;gap:8px}
.cat-item .cdot{width:8px;height:8px;border-radius:50%}
.cat-item .ccount{font-size:11px;font-weight:700;color:#475569;background:#111827;padding:2px 8px;border-radius:8px}
.cat-item.on .ccount{color:var(--ctx);background:rgba(255,255,255,.08)}
@media(max-width:700px){.cat-list{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:4px;-webkit-overflow-scrolling:touch}.cat-item{padding:7px 14px;white-space:nowrap;font-size:12px;border-radius:20px;flex-shrink:0}.cat-item .ccount{display:none}}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#0c1117;border:1px solid #151d28;border-radius:14px;cursor:pointer;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#1e293b}
.card.urg{border-color:rgba(239,68,68,.25)}
.cin{padding:16px 18px;border-left:3px solid var(--cbd,#64748b)}
.ctop{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.ctag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;background:var(--cbg);color:var(--ctx)}
.curg{font-size:10px;font-weight:700;color:#ef4444}
.ctime{margin-left:auto;font-size:11px;color:#475569}
.ctitle{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.5}
.cexp{margin-top:12px;padding-top:12px;border-top:1px solid #151d28;animation:fadeIn .2s}
.cdesc{font-size:13px;color:#9ca3af;line-height:1.75;margin-bottom:10px}
.cfoot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.csrc{font-size:11px;color:#374151}
.clink{font-size:11px;color:#3b82f6;text-decoration:none;font-weight:600}
.clink:hover{text-decoration:underline}
.cmore{text-align:right;margin-top:8px;font-size:10px;color:#334155}
.ld{text-align:center;padding:100px 20px}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid #1e293b;border-top-color:#3b82f6;margin:0 auto 24px;animation:spin 1s linear infinite}
.err{text-align:center;padding:80px 20px}
.errbtn{background:#3b82f6;color:#fff;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
.errbtn:hover{background:#2563eb}
.swarn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:8px 14px;margin-bottom:14px;font-size:11px;color:#fbbf24}
.empty{text-align:center;padding:50px 16px;color:#475569;font-size:13px}
.foot{text-align:center;padding:24px 0;color:#1e293b;font-size:10px;border-top:1px solid #0c1117;margin-top:20px}
.dbg{text-align:left;background:#0c1117;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;margin-bottom:16px;max-width:400px;margin-left:auto;margin-right:auto}
.dbg-t{font-size:10px;color:#64748b;margin-bottom:6px;font-weight:600}
.dbg-l{font-size:10px;color:#94a3b8;margin-bottom:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ===== CONFIG ===== */
var FEEDS = [
  "https://news.google.com/rss/search?q=UAE+OR+Dubai+OR+%22Abu+Dhabi%22+OR+Emirates&hl=en&gl=AE&ceid=AE:en&num=40",
  "https://news.google.com/rss/search?q=UAE+Iran+OR+Dubai+airport+OR+Hormuz+OR+Fujairah&hl=en&gl=AE&ceid=AE:en&num=40"
];
var PROXIES = [
  function(u){ return "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(u) + "&count=25"; },
  function(u){ return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
  function(u){ return "https://corsproxy.io/?url=" + encodeURIComponent(u); }
];
var REFRESH_MS = 600000;
var debugErrors = [];

/* ===== CATEGORIES ===== */
var RULES = [
  {c:"BREAKING",    k:["breaking","just in","flash","developing story"]},
  {c:"MILITARY",    k:["military","troops","warship","navy","air force","bomber","airstrike","pentagon","centcom","army","marine","weapon","arsenal"]},
  {c:"DEFENCE",     k:["intercept","missile","drone","air defen","ballistic","irgc","shield","radar","patriot","iron dome","thaad"]},
  {c:"FLIGHTS",     k:["flight","airport","dxb","dwc","airline","emirates airline","etihad","flydubai","aviation","airspace","cancel","passenger","grounded","runway"]},
  {c:"SAFETY",      k:["shelter","evacuat","safety","warning","alert","embassy","consular","danger","protect","civilian","casualt","injur","killed","debris"]},
  {c:"CONFLICT",    k:["iran","war","strike","attack","bomb","kharg","hormuz","combat","retaliat","aggression","escalat","offensive"]},
  {c:"DIPLOMACY",   k:["minister","diplomat","resolution","ceasefire","talks","summit","un security","treaty","negotiat","sanction","condemn","bilateral"]},
  {c:"ECONOMY",     k:["oil price","economic","market","trade","stock","barrel","fuel","insurance","supply chain","inflation"]},
  {c:"ENERGY",      k:["oil facility","oil hub","energy","opec","gas","petroleum","pipeline","lng","brent","wti","refinery","crude"]},
  {c:"SHIPPING",    k:["strait","vessel","cargo","ship","maritime","sea lane","blockade","tanker","naval escort","port"]},
  {c:"HUMANITARIAN",k:["humanitarian","aid","refugee","displaced","red cross","red crescent","crisis","relief"]},
  {c:"COMMUNITY",   k:["expat","resident","school","remote","daily life","ramadan","community","citizen","worker","visa"]},
  {c:"TECH",        k:["data center","ai ","artificial intelligence","cloud","amazon web","cyber","internet","telecom"]}
];
var COLORS = {
  BREAKING:     {bg:"rgba(239,68,68,.12)", tx:"#f87171",  bd:"#ef4444"},
  MILITARY:     {bg:"rgba(251,146,60,.12)",tx:"#fdba74",  bd:"#f97316"},
  DEFENCE:      {bg:"rgba(34,197,94,.12)", tx:"#86efac",  bd:"#22c55e"},
  FLIGHTS:      {bg:"rgba(59,130,246,.12)",tx:"#93c5fd",  bd:"#3b82f6"},
  SAFETY:       {bg:"rgba(245,158,11,.12)",tx:"#fcd34d",  bd:"#f59e0b"},
  CONFLICT:     {bg:"rgba(244,63,94,.12)", tx:"#fda4af",  bd:"#f43f5e"},
  DIPLOMACY:    {bg:"rgba(168,85,247,.12)",tx:"#d8b4fe",  bd:"#a855f7"},
  ECONOMY:      {bg:"rgba(234,179,8,.12)", tx:"#fde047",  bd:"#eab308"},
  ENERGY:       {bg:"rgba(217,119,6,.12)", tx:"#fbbf24",  bd:"#d97706"},
  SHIPPING:     {bg:"rgba(6,182,212,.12)", tx:"#67e8f9",  bd:"#06b6d4"},
  HUMANITARIAN: {bg:"rgba(236,72,153,.12)",tx:"#f9a8d4",  bd:"#ec4899"},
  COMMUNITY:    {bg:"rgba(99,102,241,.12)",tx:"#a5b4fc",  bd:"#6366f1"},
  TECH:         {bg:"rgba(20,184,166,.12)",tx:"#5eead4",  bd:"#14b8a6"},
  GENERAL:      {bg:"rgba(148,163,184,.08)",tx:"#94a3b8", bd:"#64748b"}
};
var CAT_ORDER = ["BREAKING","MILITARY","DEFENCE","CONFLICT","SAFETY","FLIGHTS","DIPLOMACY","ECONOMY","ENERGY","SHIPPING","HUMANITARIAN","COMMUNITY","TECH","GENERAL"];
var UAE_KW = ["uae","dubai","abu dhabi","emirates","sharjah","fujairah","ajman","ras al","umm al","dxb","etihad","khalifa","jebel ali","hormuz","gulf state","gulf region","gcc","ncema"];

/* ===== HELPERS ===== */
function classify(text){
  var t=text.toLowerCase();
  for(var i=0;i<RULES.length;i++){for(var j=0;j<RULES[i].k.length;j++){if(t.indexOf(RULES[i].k[j])!==-1)return RULES[i].c;}}
  return "GENERAL";
}
function isUrgent(title){
  var t=title.toLowerCase();
  var kw=["breaking","urgent","attack","strike","intercept","halt","suspend","shelter","evacuate","killed","destroy","fire","explosion"];
  for(var i=0;i<kw.length;i++){if(t.indexOf(kw[i])!==-1)return true;}
  return false;
}
function strip(s){return(s||"").replace(/<[^>]*>/g,"").replace(/&[^;]+;/g," ").replace(/\s+/g," ").trim();}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function isUAEArticle(text){
  var t=text.toLowerCase();
  for(var i=0;i<UAE_KW.length;i++){if(t.indexOf(UAE_KW[i])!==-1)return true;}
  return false;
}

/* ===== STATE ===== */
var news=[], appState="loading", lastUp=null, countdown=REFRESH_MS/1000;
var selCat="ALL", selDay=null, expanded=null, softError="";

/* ===== FEED FETCHING ===== */
function parseR2J(data){
  if(!data||data.status!=="ok"||!Array.isArray(data.items))return[];
  return data.items;
}
function parseXML(text){
  try{
    var p=new DOMParser();
    var doc=p.parseFromString(text,"text/xml");
    var items=doc.querySelectorAll("item");
    var r=[];
    items.forEach(function(it){
      r.push({
        title:(it.querySelector("title")||{}).textContent||"",
        description:(it.querySelector("description")||{}).textContent||"",
        link:(it.querySelector("link")||{}).textContent||"#",
        author:(it.querySelector("source")||{}).textContent||"",
        pubDate:(it.querySelector("pubDate")||{}).textContent||""
      });
    });
    return r;
  }catch(e){return[];}
}

async function fetchOne(url){
  for(var p=0;p<PROXIES.length;p++){
    try{
      var purl=PROXIES[p](url);
      var r=await fetch(purl);
      if(!r.ok){debugErrors.push("Proxy"+p+" HTTP "+r.status+" for "+url.slice(0,40));continue;}
      var ct=r.headers.get("content-type")||"";
      if(ct.indexOf("json")!==-1){
        var d=await r.json();
        var it=parseR2J(d);
        if(it.length>0)return it;
        debugErrors.push("Proxy"+p+" returned 0 items (json)");
      }else{
        var t=await r.text();
        var it2=parseXML(t);
        if(it2.length>0)return it2;
        debugErrors.push("Proxy"+p+" returned 0 items (xml)");
      }
    }catch(e){debugErrors.push("Proxy"+p+": "+e.message);}
  }
  return[];
}

async function fetchAll(){
  debugErrors=[];
  var results=[], seen={}, now=Date.now(), ago=now-7*86400000;

  for(var f=0;f<FEEDS.length;f++){
    if(f>0) await new Promise(function(r){setTimeout(r,1500);});
    try{
      var items=await fetchOne(FEEDS[f]);
      for(var i=0;i<items.length;i++){
        var item=items[i];
        var title=(item.title||"").trim();
        var key=title.toLowerCase().slice(0,50);
        if(!key||seen[key])continue;
        var pub=new Date(item.pubDate);
        if(isNaN(pub.getTime())||pub.getTime()<ago)continue;
        seen[key]=true;
        var desc=strip(item.description||"").slice(0,400);
        var fullText=title+" "+desc;
        if(!isUAEArticle(fullText))continue;
        results.push({
          title:title,
          desc:desc,
          link:item.link||"#",
          src:(item.author||"").replace(/^www\./,""),
          cat:classify(fullText),
          urgent:isUrgent(title),
          date:pub.toISOString().slice(0,10),
          time:pub.toLocaleDateString("en-GB",{day:"numeric",month:"short"}),
          clock:pub.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:true}),
          ts:pub.getTime()
        });
      }
    }catch(e){debugErrors.push("Feed "+f+": "+e.message);}
  }
  results.sort(function(a,b){return b.ts-a.ts;});
  return results;
}

async function loadNews(){
  if(news.length===0)appState="loading";
  softError="";
  render();
  try{
    var items=await fetchAll();
    if(items.length===0)throw new Error("No UAE articles found");
    news=items;
    lastUp=new Date();
    countdown=REFRESH_MS/1000;
    appState="ready";
    softError="";
  }catch(e){
    if(news.length>0){
      softError="Refresh failed — showing last data.";
      countdown=REFRESH_MS/1000;
    }else{
      appState="error";
    }
  }
  render();
}

/* ===== DATE HELPERS ===== */
function getLast7(){
  var r=[];
  for(var i=0;i<7;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    r.push({key:d.toISOString().slice(0,10),d:d.getDate(),wd:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()],today:i===0});
  }
  return r;
}
function getCats(items){
  var counts={};
  for(var i=0;i<items.length;i++){var c=items[i].cat;counts[c]=(counts[c]||0)+1;}
  var result=[];
  for(var j=0;j<CAT_ORDER.length;j++){if(counts[CAT_ORDER[j]])result.push({c:CAT_ORDER[j],n:counts[CAT_ORDER[j]]});}
  return result;
}

/* ===== RENDER ===== */
function render(){
  var days=getLast7();
  var mn=Math.floor(countdown/60), sc=countdown%60;
  var timeStr=lastUp?lastUp.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
  var dotColor=appState==="loading"?"#facc15":appState==="ready"?"#22c55e":"#ef4444";
  var cdText=appState==="loading"?"loading…":mn+":"+String(sc).padStart(2,"0");

  var filtered=[];
  for(var i=0;i<news.length;i++){
    var n=news[i];
    if(selCat!=="ALL"&&n.cat!==selCat)continue;
    if(selDay&&n.date!==selDay)continue;
    filtered.push(n);
  }

  var dayScoped=selDay?news.filter(function(n){return n.date===selDay;}):news;
  var catData=getCats(dayScoped);

  var h='';

  /* HEADER */
  h+='<div class="hdr"><div style="max-width:900px;margin:0 auto;padding:0 16px">';
  h+='<div class="hdr-row">';
  h+='<div class="hdr-left"><div class="dot" style="background:'+dotColor+';box-shadow:0 0 8px '+dotColor+'55"></div><h1>\u{1f1e6}\u{1f1ea} UAE NEWS MONITOR</h1></div>';
  h+='<div class="hdr-right">';
  if(timeStr)h+='<span>'+timeStr+'</span>';
  h+='<span id="cdSpan">'+cdText+'</span>';
  if(appState!=="loading")h+='<button class="rbtn" onclick="loadNews()">\u21bb Refresh</button>';
  h+='</div></div>';

  /* DAYS */
  if(news.length>0){
    h+='<div class="days">';
    h+='<button class="dbtn'+(!selDay?' on':'')+'" onclick="window._sd(null)">';
    h+='<div class="dw">ALL</div><div class="dd">'+news.length+'</div><div class="dc">stories</div></button>';
    for(var d=0;d<days.length;d++){
      var dy=days[d];
      var ct=0;for(var j=0;j<news.length;j++){if(news[j].date===dy.key)ct++;}
      var on=selDay===dy.key;
      h+='<button class="dbtn'+(on?' on':'')+'" style="opacity:'+(ct>0?'1':'.3')+'" onclick="window._sd(\''+dy.key+'\')">';
      h+='<div class="dw">'+(dy.today?"TODAY":dy.wd)+'</div>';
      h+='<div class="dd">'+dy.d+'</div>';
      h+='<div class="dc">'+(ct>0?ct+' article'+(ct>1?'s':''):'\u2014')+'</div>';
      h+='</button>';
    }
    h+='</div>';
  }
  h+='</div></div>';

  /* MAIN */
  h+='<div class="main">';

  if(appState==="loading"&&news.length===0){
    h+='<div class="ld"><div class="spin"></div>';
    h+='<div style="color:#94a3b8;font-size:15px;margin-bottom:6px">Loading UAE news feeds\u2026</div>';
    h+='<div style="color:#475569;font-size:12px">Fetching from Google News RSS</div></div></div>';
    document.getElementById("app").innerHTML=h;
    return;
  }

  if(appState==="error"&&news.length===0){
    h+='<div class="err"><div style="font-size:32px;margin-bottom:16px">\u26a0\ufe0f</div>';
    h+='<div style="color:#f87171;font-size:14px;margin-bottom:6px">Could not load news feeds</div>';
    h+='<div style="color:#475569;font-size:12px;margin-bottom:12px">All proxy services failed</div>';
    if(debugErrors.length>0){
      h+='<div class="dbg"><div class="dbg-t">DEBUG LOG:</div>';
      for(var e=0;e<debugErrors.length;e++){h+='<div class="dbg-l">\u2022 '+esc(debugErrors[e])+'</div>';}
      h+='</div>';
    }
    h+='<button class="errbtn" onclick="loadNews()">Retry</button></div></div>';
    document.getElementById("app").innerHTML=h;
    return;
  }

  if(softError)h+='<div class="swarn">\u26a0\ufe0f '+esc(softError)+'</div>';

  /* TWO COLUMN */
  h+='<div class="top-bar">';

  /* SIDEBAR */
  h+='<div class="sidebar"><div class="cat-list">';
  var allOn=selCat==="ALL";
  h+='<div class="cat-item'+(allOn?' on':'')+'" style="--cbg:rgba(255,255,255,.05);--cbd:#475569;--ctx:#e2e8f0" onclick="window._sc(\'ALL\')">';
  h+='<span class="cname"><span class="cdot" style="background:#94a3b8"></span>All News</span>';
  h+='<span class="ccount">'+dayScoped.length+'</span></div>';
  for(var ci=0;ci<catData.length;ci++){
    var cd=catData[ci], cc=COLORS[cd.c]||COLORS.GENERAL, con=selCat===cd.c;
    h+='<div class="cat-item'+(con?' on':'')+'" style="--cbg:'+cc.bg+';--cbd:'+cc.bd+';--ctx:'+cc.tx+'" onclick="window._sc(\''+cd.c+'\')">';
    h+='<span class="cname"><span class="cdot" style="background:'+cc.bd+'"></span>'+cd.c+'</span>';
    h+='<span class="ccount">'+cd.n+'</span></div>';
  }
  h+='</div></div>';

  /* FEED */
  h+='<div class="feed"><div class="cards">';
  if(filtered.length===0){
    h+='<div class="empty">No stories match this filter combination.</div>';
  }
  for(var fi=0;fi<filtered.length;fi++){
    var n=filtered[fi];
    var c=COLORS[n.cat]||COLORS.GENERAL;
    var k=selCat+"-"+(selDay||"a")+"-"+fi;
    var open=expanded===k;
    h+='<div class="card'+(n.urgent?' urg':'')+'" onclick="window._tg(\''+k+'\')">';
    h+='<div class="cin" style="--cbd:'+c.bd+'">';
    h+='<div class="ctop">';
    h+='<span class="ctag" style="--cbg:'+c.bg+';--ctx:'+c.tx+'">'+esc(n.cat)+'</span>';
    if(n.urgent)h+='<span class="curg">URGENT</span>';
    h+='<span class="ctime">'+esc(n.time)+' \u00b7 '+esc(n.clock)+'</span></div>';
    h+='<div class="ctitle">'+esc(n.title)+'</div>';
    if(open){
      h+='<div class="cexp">';
      h+='<div class="cdesc">'+esc(n.desc||"No description available.")+'</div>';
      h+='<div class="cfoot">';
      h+='<span class="csrc">'+esc(n.src)+'</span>';
      h+='<a class="clink" href="'+esc(n.link)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read full article \u2192</a>';
      h+='</div></div>';
    }
    h+='<div class="cmore">'+(open?'\u25b2 Collapse':'\u25bc Read more')+'</div>';
    h+='</div></div>';
  }
  h+='</div></div>';
  h+='</div>';

  h+='<div class="foot">Powered by Google News RSS \u00b7 Auto-refreshes every 10 minutes \u00b7 '+news.length+' articles loaded</div>';
  h+='</div>';

  document.getElementById("app").innerHTML=h;
}

/* ===== HANDLERS ===== */
window._sd=function(d){selDay=(selDay===d)?null:d;expanded=null;render();};
window._sc=function(c){selCat=c;expanded=null;render();};
window._tg=function(k){expanded=(expanded===k)?null:k;render();};

/* ===== INIT ===== */
render();
loadNews();
setInterval(loadNews, REFRESH_MS);
setInterval(function(){
  countdown=Math.max(0,countdown-1);
  var el=document.getElementById("cdSpan");
  if(el)el.textContent=Math.floor(countdown/60)+":"+String(countdown%60).padStart(2,"0");
},1000);
</script>
